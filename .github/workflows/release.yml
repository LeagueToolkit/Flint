name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Flint ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.content }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Patch latest.json notes and push to updater release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          NOTES="${{ steps.changelog.outputs.content }}"

          # Download latest.json produced by tauri-action
          gh release download "$TAG" --pattern "latest.json" --dir . --clobber

          # Inject the git-cliff notes into latest.json
          jq --arg notes "$NOTES" '.notes = $notes' latest.json > latest.patched.json
          mv latest.patched.json latest.json

          # Re-upload to the same versioned release
          gh release upload "$TAG" latest.json --clobber

          # Also keep a pinned "updater" release up-to-date
          if gh release view updater &>/dev/null; then
            gh release upload updater latest.json --clobber
          else
            gh release create updater latest.json \
              --title "Updater" \
              --notes "Auto-updated by CI. Contains the latest updater manifest for in-app updates." \
              --latest=false
          fi
